spring.application.name=CircuitBreakerAndFaultToleranceSystem

# =========================
# Database Configuration
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/circuitdb
spring.datasource.username=root
spring.datasource.password=root9099

# =========================
# JPA Configuration
# =========================
spring.jpa.hibernate.ddl-auto=update

# Circuit Breaker
resilience4j.circuitbreaker.instances.creditService.sliding-window-size=10
resilience4j.circuitbreaker.instances.creditService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.creditService.failure-rate-threshold=50

# Retry
resilience4j.retry.instances.creditService.max-attempts=3
resilience4j.retry.instances.creditService.wait-duration=2s

# Time Limiter
resilience4j.timelimiter.instances.creditService.timeout-duration=5s
