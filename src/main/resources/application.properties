spring.application.name=CircuitBreakerAndFaultToleranceSystem

# =========================
# Database Configuration
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/circuitdb
spring.datasource.username=root
spring.datasource.password=root9099

# =========================
# JPA Configuration
# =========================
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

 ACTUATOR
# =========================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Circuit Breaker
resilience4j.circuitbreaker.instances.creditService.sliding-window-size=10
resilience4j.circuitbreaker.instances.creditService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.creditService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.creditService.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.creditService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.creditService.automatic-transition-from-open-to-half-open-enabled=true

# =========================
# CUSTOMER SERVICE
# =========================
resilience4j.circuitbreaker.instances.customerService.sliding-window-size=10
resilience4j.circuitbreaker.instances.customerService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.customerService.wait-duration-in-open-state=20s

# =========================
# PAYMENT SERVICE
# =========================
resilience4j.circuitbreaker.instances.paymentService.sliding-window-size=10
resilience4j.circuitbreaker.instances.paymentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentService.wait-duration-in-open-state=20s

# Retry
resilience4j.retry.instances.creditService.max-attempts=3
resilience4j.retry.instances.creditService.wait-duration=2s

resilience4j.retry.instances.customerService.max-attempts=3
resilience4j.retry.instances.customerService.wait-duration=2s

resilience4j.retry.instances.paymentService.max-attempts=3
resilience4j.retry.instances.paymentService.wait-duration=2s

# Time Limiter
resilience4j.timelimiter.instances.creditService.timeout-duration=5s
resilience4j.timelimiter.instances.customerService.timeout-duration=5s

resilience4j.timelimiter.instances.paymentService.timeout-duration=5s

LOGGING
# =========================
logging.level.io.github.resilience4j=DEBUG
logging.level.org.springframework.web=INFO
